# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy with: https://render.com/deploy?repo=https://github.com/Sathvik-C/Stock-Spike-Reasoning

services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────────
  - type: web
    name: stock-spike-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NEWSDATA_API_KEY
        sync: false  # You'll set this manually in the Render dashboard
      - key: HF_API_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false  # Set to your frontend URL, e.g. https://stock-spike-frontend.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9

  # ── Frontend (React Static Site) ──────────────────────────────────────
  - type: web
    name: stock-spike-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false  # Set to: https://stock-spike-backend.onrender.com/api
