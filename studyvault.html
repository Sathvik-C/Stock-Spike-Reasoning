<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyVault — Academic Organizer</title>
  <meta name="description" content="StudyVault ingests WhatsApp and Telegram chat exports and auto-organizes shared files into folders by subject and category using AI classification.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
  <style>
    /* ===== Reset ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font: inherit; border: none; background: none; cursor: pointer; color: inherit; }
    input { font: inherit; border: none; background: none; color: inherit; outline: none; }
    ul, ol { list-style: none; }
    a { color: inherit; text-decoration: none; }

    /* ===== Tokens ===== */
    :root {
      --bg-base: #14151F;
      --bg-raised: #1A1B28;
      --bg-surface: #1F2031;
      --bg-hover: #262738;
      --bg-active: #2C2D42;

      --text-primary: #EDEDF2;
      --text-secondary: #8B8D9E;
      --text-muted: #5D5F70;

      --accent: #E8A33D;
      --accent-dim: #C48A30;
      --accent-bg: rgba(232,163,61,0.10);
      --accent-bg-hover: rgba(232,163,61,0.16);
      --accent-border: rgba(232,163,61,0.22);

      --success: #5FAE7C;
      --danger: #E25C5C;
      --danger-light: #ff8b8b;

      --border: #282A3A;
      --border-subtle: #222336;

      --tag-notes: #A0A2B4;
      --tag-exams: #C4A08A;
      --tag-assignments: #D4A050;
      --tag-attendance: #9090A2;
      --tag-resources: #5FAE7C;
      --tag-other: #7A7C8E;
      --tag-lab: #8CAACF;
      --tag-drafts: #A898B4;
      --badge-wa: #6BBF8A;
      --badge-tg: #7BA8D4;

      --font-serif: 'Fraunces', Georgia, 'Times New Roman', serif;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;

      --sidebar-w: 280px;
      --mobile-header-h: 52px;
      --r-sm: 4px;
      --r-md: 6px;
      --r-lg: 8px;
    }

    :root[data-theme="light"] {
      --bg-base: #F8F9FA;
      --bg-raised: #FFFFFF;
      --bg-surface: #FFFFFF;
      --bg-hover: #F1F3F5;
      --bg-active: #E9ECEF;

      --text-primary: #212529;
      --text-secondary: #495057;
      --text-muted: #868E96;

      --accent: #D97706;
      --accent-dim: #B45309;
      --accent-bg: rgba(217,119,6,0.10);
      --accent-bg-hover: rgba(217,119,6,0.16);
      --accent-border: rgba(217,119,6,0.22);

      --success: #059669;
      --danger: #DC2626;
      --danger-light: #DC2626;

      --border: #DEE2E6;
      --border-subtle: #E9ECEF;

      --tag-notes: #475569;
      --tag-exams: #9A3412;
      --tag-assignments: #B45309;
      --tag-attendance: #475569;
      --tag-resources: #059669;
      --tag-other: #475569;
      --tag-lab: #1D4ED8;
      --tag-drafts: #6D28D9;
      --badge-wa: #059669;
      --badge-tg: #2563EB;
    }

    .theme-toggle-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .theme-toggle-btn:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
    }

    /* ===== Base ===== */
    html { font-size: 14px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.55;
      overflow: hidden;
      height: 100vh;
    }

    /* ===== Focus ===== */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: var(--r-sm);
    }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ===== App Shell ===== */
    .app { display: flex; height: 100vh; }

    /* ===== Mobile Header ===== */
    .mobile-header {
      display: none;
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--mobile-header-h);
      background: var(--bg-raised);
      border-bottom: 1px solid var(--border);
      align-items: center;
      padding: 0 16px;
      z-index: 90;
      gap: 12px;
    }
    .mobile-header .brand-text { font-family: var(--font-serif); font-size: 16px; font-weight: 600; }
    .hamburger-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--r-md);
      color: var(--text-secondary);
      transition: background 150ms ease, color 150ms ease;
    }
    .hamburger-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

    /* ===== Sidebar ===== */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      height: 100vh;
      background: var(--bg-raised);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-brand {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .sidebar-brand h1 {
      font-family: var(--font-serif);
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }
    .sidebar-brand p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      letter-spacing: 0.02em;
    }

    .sidebar-actions { padding: 16px 16px 8px; }

    .new-upload-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 9px 14px;
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      color: var(--accent);
      border-radius: var(--r-md);
      font-size: 13px;
      font-weight: 500;
      transition: background 150ms ease, border-color 150ms ease;
    }
    .new-upload-btn:hover {
      background: var(--accent-bg-hover);
      border-color: rgba(232,163,61,0.35);
    }
    .new-upload-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    .sidebar-section { flex: 1; overflow-y: auto; padding: 8px 0; }
    .sidebar-label {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 10px 20px 6px;
    }

    /* Chat items */
    .chat-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 20px 10px 16px;
      border-left: 3px solid transparent;
      transition: background 150ms ease, border-color 150ms ease;
      cursor: pointer;
    }
    .chat-item:hover { background: var(--bg-hover); }
    .chat-item.active {
      background: var(--bg-surface);
      border-left-color: var(--accent);
    }
    .chat-item-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }
    .chat-item-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
      font-size: 11.5px;
      color: var(--text-muted);
    }
    .source-badge {
      display: inline-flex;
      align-items: center;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
    }
    .source-badge.wa { background: rgba(95,174,124,0.12); color: var(--badge-wa); }
    .source-badge.tg { background: rgba(100,150,220,0.12); color: var(--badge-tg); }
    .chat-item-meta .sep { color: var(--border); }

    .sidebar-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-footer-links {
      display: flex;
      gap: 16px;
    }
    .sidebar-footer-link {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 150ms ease;
    }
    .sidebar-footer-link:hover { color: var(--text-secondary); }
    .sidebar-footer-link svg { width: 13px; height: 13px; }
    .sidebar-version {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      opacity: 0.6;
    }

    /* ===== Sidebar Overlay (mobile) ===== */
    .sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(10,11,18,0.65);
      z-index: 99;
    }
    .sidebar-overlay.visible { display: block; }

    /* ===== Main Content ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* Main Header */
    .main-header {
      padding: 24px 32px 0;
      flex-shrink: 0;
    }
    .main-header h2 {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }
    .main-header-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .main-header-meta .sep { color: var(--border); font-size: 10px; }

    /* Tab Bar */
    .tab-bar {
      display: flex;
      gap: 0;
      padding: 0 32px;
      margin-top: 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab-btn {
      position: relative;
      padding: 10px 18px 11px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 150ms ease;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text-secondary); }
    .tab-btn.active {
      color: var(--text-primary);
      border-bottom-color: var(--accent);
    }
    .tab-btn svg { width: 14px; height: 14px; }
    .tab-badge {
      font-size: 10px;
      font-weight: 600;
      min-width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 9px;
      padding: 0 5px;
      background: var(--bg-hover);
      color: var(--text-secondary);
    }
    .tab-btn.active .tab-badge { background: var(--accent-bg); color: var(--accent); }

    /* Tab Content */
    .tab-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px 32px;
    }

    /* ===== Empty States ===== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px;
      max-width: 400px;
      margin: 0 auto;
    }
    .empty-state-icon {
      width: 48px;
      height: 48px;
      color: var(--text-muted);
      opacity: 0.5;
      margin-bottom: 20px;
    }
    .empty-state h3 {
      font-family: var(--font-serif);
      font-size: 17px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .empty-state p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }
    .empty-state .action-hint {
      margin-top: 20px;
      font-size: 12px;
      color: var(--accent-dim);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .empty-state .action-hint svg { width: 13px; height: 13px; }

    /* ===== Welcome State ===== */
    .welcome-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 40px 24px;
    }
    .welcome-state h2 {
      font-family: var(--font-serif);
      font-size: 26px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 10px;
    }
    .welcome-state p {
      font-size: 14px;
      color: var(--text-secondary);
      max-width: 420px;
      line-height: 1.65;
    }
    .welcome-state .welcome-icon {
      width: 56px; height: 56px;
      color: var(--accent);
      opacity: 0.35;
      margin-bottom: 24px;
    }
    .welcome-formats {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .welcome-format {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      font-size: 12px;
      color: var(--text-secondary);
    }
    .welcome-format svg { width: 14px; height: 14px; color: var(--text-muted); }

    /* ===== Upload Tab ===== */
    .upload-zone {
      border: 1.5px dashed var(--border);
      border-radius: var(--r-lg);
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 200ms ease, background 200ms ease;
    }
    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(232,163,61,0.04);
    }
    .upload-zone-icon {
      width: 36px; height: 36px;
      color: var(--text-muted);
      margin: 0 auto 16px;
    }
    .upload-zone h3 {
      font-family: var(--font-serif);
      font-size: 16px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .upload-zone p { font-size: 13px; color: var(--text-muted); }
    .upload-zone .format-hint {
      margin-top: 16px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.7;
    }
    .upload-zone input[type="file"] { display: none; }

    /* Processing state */
    .upload-processing {
      margin-top: 24px;
      padding: 20px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
    }
    .upload-step {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }
    .upload-step svg { width: 15px; height: 15px; flex-shrink: 0; }
    .upload-step.done { color: var(--success); }
    .upload-step.active { color: var(--text-primary); }
    .progress-track {
      height: 3px;
      background: var(--bg-hover);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 300ms ease;
    }

    /* Recent uploads */
    .recent-uploads { margin-top: 32px; }
    .recent-uploads-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .upload-history-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-md);
      margin-bottom: 8px;
    }
    .upload-history-icon {
      width: 32px; height: 32px;
      border-radius: var(--r-md);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .upload-history-icon.complete { background: var(--success-bg); color: var(--success); }
    .upload-history-icon svg { width: 16px; height: 16px; }
    .upload-history-content { flex: 1; min-width: 0; }
    .upload-history-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .upload-history-stats {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .upload-history-time {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* ===== Files Tab ===== */
    .file-tree { }
    .folder-group { margin-bottom: 2px; }
    .folder-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: var(--r-md);
      cursor: pointer;
      transition: background 150ms ease;
      user-select: none;
    }
    .folder-row:hover { background: var(--bg-hover); }
    .folder-chevron {
      width: 14px; height: 14px;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: transform 150ms ease;
    }
    .folder-row.expanded .folder-chevron { transform: rotate(90deg); }
    .folder-icon { width: 16px; height: 16px; color: var(--accent-dim); flex-shrink: 0; }
    .folder-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      flex: 1;
      min-width: 0;
    }
    .folder-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* Category Tags */
    .cat-tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 2px 7px;
      border-radius: 3px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .cat-tag.notes       { background: rgba(168,170,184,0.12); color: var(--tag-notes); }
    .cat-tag.exams       { background: rgba(207,160,140,0.12); color: var(--tag-exams); }
    .cat-tag.assignments { background: rgba(232,163,61,0.10);  color: var(--tag-assignments); }
    .cat-tag.attendance  { background: rgba(139,141,158,0.12); color: var(--tag-attendance); }
    .cat-tag.resources   { background: rgba(95,174,124,0.10);  color: var(--tag-resources); }
    .cat-tag.other       { background: rgba(139,141,158,0.08); color: var(--tag-other); }
    .cat-tag.lab-reports { background: rgba(140,170,207,0.12); color: var(--tag-lab); }
    .cat-tag.drafts      { background: rgba(180,160,200,0.10); color: var(--tag-drafts); }

    /* File rows */
    .folder-files { display: none; padding-left: 22px; }
    .folder-files.visible { display: block; }
    .file-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px 6px 20px;
      border-left: 1px solid var(--border-subtle);
      margin-left: 7px;
      transition: background 150ms ease;
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
    }
    .file-row:hover { background: var(--bg-hover); }
    .file-icon { width: 14px; height: 14px; color: var(--text-muted); flex-shrink: 0; }
    .file-name {
      font-size: 13px;
      color: var(--text-secondary);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-row:hover .file-name { color: var(--text-primary); }
    .file-size {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
      text-align: right;
      min-width: 56px;
    }

    /* ===== Important Tab ===== */
    .important-list { }
    .important-item {
      display: flex;
      gap: 14px;
      padding: 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-md);
      margin-bottom: 8px;
      transition: border-color 150ms ease;
    }
    .important-item:hover { border-color: var(--border); }
    .important-flag {
      width: 18px; height: 18px;
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 1px;
    }
    .important-body { flex: 1; min-width: 0; }
    .important-text {
      font-size: 13px;
      color: var(--text-primary);
      line-height: 1.5;
    }
    .important-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .important-sender {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text-secondary);
    }
    .important-sender svg { width: 12px; height: 12px; }
    .important-trigger {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      background: var(--accent-bg);
      color: var(--accent-dim);
    }
    .important-date {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .important-date svg { width: 12px; height: 12px; }
    .important-deadline {

      return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function highlightText(text, query) {
      if (!query) return escapeHtml(text);
      const escaped = escapeHtml(text);
      const regex = new RegExp(`(${escapeRegex(escapeHtml(query))})`, 'gi');
      return escaped.replace(regex, '<mark>$1</mark>');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;

      const tree = chat.folders.map(folder => {
        const expanded = state.expandedFolders.has(folder.id);
        const fileRows = folder.files.map(file => `
          <div class="file-row">
            <i data-lucide="${getFileIcon(file.type)}" class="file-icon"></i>
            <span class="file-name" title="${escapeHtml(file.name)}">${escapeHtml(file.name)}</span>
            <span class="file-size">${file.size}</span>
          </div>
        `).join('');

        return `
          <div class="folder-group">
            <div class="folder-row${expanded ? ' expanded' : ''}" data-folder="${folder.id}" tabindex="0" role="button" aria-expanded="${expanded}">
              <i data-lucide="chevron-right" class="folder-chevron"></i>
              <i data-lucide="folder" class="folder-icon"></i>
              <span class="folder-name">${escapeHtml(folder.name)}</span>
              <span class="cat-tag ${folder.category}">${escapeHtml(folder.category.replace('-', ' '))}</span>
              <span class="folder-count">${folder.files.length}</span>
            </div>
            <div class="folder-files${expanded ? ' visible' : ''}" id="ff-${folder.id}">
              ${fileRows}
            </div>
          </div>
        `;
      }).join('');

      return `<div class="file-tree">${tree}</div>`;
    }

    // ---- Important Tab ----
    function renderImportantTab(chat) {
      if (!chat.important.length) {
        return renderEmptyState('flag', 'No flagged messages', 'Messages mentioning deadlines, exam dates, schedule changes, or other important announcements will surface here automatically.');
      }

      const items = chat.important.map(item => {
        const deadlineHtml = item.deadline
          ? `<span class="important-deadline"><i data-lucide="clock"></i>Due ${escapeHtml(item.deadline)}</span>`
          : '';

        return `
          <div class="important-item">
            <i data-lucide="flag" class="important-flag"></i>
            <div class="important-body">
              <div class="important-text">${escapeHtml(item.text)}</div>
              <div class="important-meta">
                <span class="important-sender"><i data-lucide="user"></i>${escapeHtml(item.sender)}</span>
                <span class="important-trigger">${escapeHtml(item.trigger)}</span>
                <span class="important-date"><i data-lucide="calendar"></i>${escapeHtml(item.date)}</span>
                ${deadlineHtml}
              </div>
            </div>
          </div>
        `;
      }).join('');

      return `<div class="important-list">${items}</div>`;
    }

    // ---- Search Tab ----
    function renderSearchTab(chat) {
      return `
        <div class="search-input-wrap">
          <i data-lucide="search"></i>
          <input type="text" class="search-input" id="search-input" placeholder="Search messages and files\u2026" autocomplete="off" spellcheck="false">
        </div>
        <div id="search-results">
          ${state.searchQuery ? '' : renderEmptyState('search', 'Search this chat', 'Type a keyword to search across all messages and shared files in this conversation.')}
        </div>
      `;
    }

    function renderSearchResults(chat) {
      const container = document.getElementById('search-results');
      if (!container) return;
      const q = state.searchQuery.trim();

      if (!q) {
        container.innerHTML = renderEmptyState('search', 'Search this chat', 'Type a keyword to search across all messages and shared files in this conversation.');
        lucide.createIcons();
        return;
      }

      const lower = q.toLowerCase();
      const results = [];

      // Search messages
      chat.messages.forEach(msg => {
        if (msg.text.toLowerCase().includes(lower) || msg.sender.toLowerCase().includes(lower)) {
          results.push({ type: 'message', ...msg });
        }
      });

      // Search files
      chat.folders.forEach(folder => {
        folder.files.forEach(file => {
          if (file.name.toLowerCase().includes(lower)) {
            results.push({ type: 'file', folder: folder.name, ...file });
          }
        });
      });

      if (!results.length) {
        container.innerHTML = renderEmptyState('search-x', 'No matches found', `Nothing in this chat matches \u201c${escapeHtml(q)}\u201d. Try a different keyword.`);
        lucide.createIcons();
        return;
      }

      const countHtml = `<div class="search-results-count">${results.length} result${results.length === 1 ? '' : 's'} for \u201c${escapeHtml(q)}\u201d</div>`;

      const items = results.map(r => {
        if (r.type === 'message') {
          return `
            <div class="search-result">
              <div class="search-result-type"><i data-lucide="message-circle"></i> Message</div>
              <div class="search-result-text">${highlightText(r.text, q)}</div>
              <div class="search-result-meta">
                <span>${escapeHtml(r.sender)}</span>
                <span class="sep">\u00b7</span>
                <span>${escapeHtml(r.date)}</span>
              </div>
            </div>
          `;
        } else {
          return `
            <div class="search-result">
              <div class="search-result-type"><i data-lucide="file-text"></i> File in ${escapeHtml(r.folder)}</div>
              <div class="search-result-text">${highlightText(r.name, q)}</div>
              <div class="search-result-meta">
                <span class="file-size" style="min-width:auto">${r.size}</span>
              </div>
            </div>
          `;
        }
      }).join('');

      container.innerHTML = countHtml + items;
      lucide.createIcons();
    }

    // ---- Empty State ----
    function renderEmptyState(icon, title, description) {
      const iconName = icon === 'search-x' ? 'search' : icon;
      return `
        <div class="empty-state">
          <i data-lucide="${iconName}" class="empty-state-icon"></i>
          <h3>${title}</h3>
          <p>${description}</p>
        </div>
      `;
    }

    // ============================
    // Upload Simulation
    // ============================
    function simulateUpload() {
      const area = document.getElementById('upload-processing-area');
      if (!area || state.uploadInProgress) return;
      state.uploadInProgress = true;

      area.innerHTML = `
        <div class="upload-processing">
          <div class="upload-step active" id="step-parse"><i data-lucide="loader"></i> Parsing chat export\u2026</div>
          <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
        </div>
      `;
      lucide.createIcons();

      const fill = document.getElementById('prog-fill');

      // Step 1: Parse
      let progress = 0;
      const parseInterval = setInterval(() => {
        progress += Math.random() * 15 + 5;
        if (progress >= 100) progress = 100;
        fill.style.width = progress + '%';
        if (progress >= 100) {
          clearInterval(parseInterval);
          stepClassify();
        }
      }, 200);

      function stepClassify() {
        const step = document.getElementById('step-parse');
        step.className = 'upload-step done';
        step.innerHTML = '<i data-lucide="check-circle"></i> Chat parsed \u2014 127 messages found';

        area.querySelector('.upload-processing').insertAdjacentHTML('beforeend',
          '<div class="upload-step active" id="step-classify" style="margin-top:12px"><i data-lucide="loader"></i> Classifying files with AI\u2026</div>'
        );
        lucide.createIcons();

        fill.style.width = '0%';
        let p2 = 0;
        const classifyInterval = setInterval(() => {
          p2 += Math.random() * 12 + 3;
          if (p2 >= 100) p2 = 100;
          fill.style.width = p2 + '%';
          if (p2 >= 100) {
            clearInterval(classifyInterval);
            stepDone();
          }
        }, 250);
      }

      function stepDone() {
        const step = document.getElementById('step-classify');
        step.className = 'upload-step done';
        step.innerHTML = '<i data-lucide="check-circle"></i> 15 files organized into 5 categories';

        area.querySelector('.upload-processing').insertAdjacentHTML('beforeend',
          '<div class="upload-step done" style="margin-top:12px"><i data-lucide="check-circle"></i> 4 important messages flagged</div>'
        );
        fill.style.width = '100%';
        fill.style.background = 'var(--success)';
        lucide.createIcons();
        state.uploadInProgress = false;
      }
    }

    // ============================
    // Event Delegation
    // ============================
    document.addEventListener('click', e => {
      // Chat item
      const chatItem = e.target.closest('.chat-item');
      if (chatItem) {
        state.activeChat = chatItem.dataset.chat;
        state.activeTab = 'files';
        state.searchQuery = '';
        closeSidebar();
        render();
        return;
      }

      // Tab button
      const tabBtn = e.target.closest('.tab-btn');
      if (tabBtn) {
        state.activeTab = tabBtn.dataset.tab;
        state.searchQuery = '';
        renderMain();
        return;
      }

      // Folder toggle
      const folderRow = e.target.closest('.folder-row');
      if (folderRow) {
        const id = folderRow.dataset.folder;
        if (state.expandedFolders.has(id)) {
          state.expandedFolders.delete(id);
        } else {
          state.expandedFolders.add(id);
        }
        const filesEl = document.getElementById('ff-' + id);
        if (filesEl) filesEl.classList.toggle('visible');
        folderRow.classList.toggle('expanded');
        lucide.createIcons();
        return;
      }

      // New upload btn
      if (e.target.closest('#new-upload-btn')) {
        if (!state.activeChat) state.activeChat = Object.keys(CHATS)[0];
        state.activeTab = 'upload';
        closeSidebar();
        render();
        return;
      }

      // Upload zone
      if (e.target.closest('#upload-zone')) {
        const input = document.getElementById('file-input');
        if (input) input.click();
        return;
      }

      // Sidebar overlay
      if (e.target.id === 'sidebar-overlay') {
        closeSidebar();
        return;
      }

      // Hamburger
      if (e.target.closest('#hamburger-btn')) {
        openSidebar();
        return;
      }
    });

    // Keyboard: Enter on folder rows
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const folderRow = e.target.closest('.folder-row');
        if (folderRow) {
          folderRow.click();
          return;
        }
        const uploadZone = e.target.closest('#upload-zone');
        if (uploadZone) {
          uploadZone.click();
          return;
        }
      }
    });

    // Drag and drop
    document.addEventListener('dragover', e => {
      e.preventDefault();
      const zone = document.getElementById('upload-zone');
      if (zone) zone.classList.add('dragover');
    });
    document.addEventListener('dragleave', e => {
      const zone = document.getElementById('upload-zone');
      if (zone && !zone.contains(e.relatedTarget)) zone.classList.remove('dragover');
    });
    document.addEventListener('drop', e => {
      e.preventDefault();
      const zone = document.getElementById('upload-zone');
      if (zone) {
        zone.classList.remove('dragover');
        simulateUpload();
      }
    });

    // File input
    document.addEventListener('change', e => {
      if (e.target.id === 'file-input') {
        simulateUpload();
      }
    });

    // ============================
    // Mobile Sidebar
    // ============================
    function openSidebar() {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('sidebar-overlay').classList.add('visible');
      state.sidebarOpen = true;
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.remove('visible');
      state.sidebarOpen = false;
    }

    // ============================
    // Init
    // ============================
    render();
  </script>
</body>
</html>
